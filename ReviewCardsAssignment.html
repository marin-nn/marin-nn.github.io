<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Cards</title>

  <style>
  .cards {
    width: 200px;
    height: 200px;
    background-color: #a9b3d1;
	border-radius: 5px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    overflow: hidden;
  }

  .cards span {
    position: absolute;
    transition: opacity 0.5s ease;
  }

  .cards .question {
    opacity: 1;
  }

  .cards .answer {
    opacity: 0;
  }

  .cards:hover .question {
    opacity: 0;
  }

  .cards:hover .answer {
    opacity: 1;
  }
</style>
</head>
<body>
<div class="cards">
  <span class="question">Hello!</span>
  <span class="answer">Goodbye!</span>
</div>
</style>
