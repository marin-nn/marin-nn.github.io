<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Imitation Assignment</title>
  <link rel="stylesheet" href="https://marin-nn.github.io/TheImitationAssignment/ImitationAssignment.css">
<style>
img {
    height: 250px;
    width: auto;
}
.a1 {
	border-radius: 50%;
	border: 1px solid black;
    filter: sepia(100%);
}
.a2 {
  filter: grayscale(100%);
  border: 50px solid #000;
  border-image: url(https://marin-nn.github.io/TheImitationAssignment/tic-tac-toe.png) 50 round;
  }
.a3 {
  filter: hue-rotate(90deg) drop-shadow(10px 0px 5px #000000);
  }
.a4 {
  background: linear-gradient(135deg, blue, white);
  filter: drop-shadow(0px 20px 5px #D3D3D3);
  }
.a5 {
  border-top-left-radius: 100px;
  border-bottom-right-radius: 100px;
  filter: invert(100%);
  }
.a6 {
  position: relative;         
  display: inline-block;      
}
img.a6 {
  height: 100px;           
  width: auto;              
  display: block;
}
.a6.t {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-weight: bold;
  text-shadow: 2px 2px 8px black;
  white-space: nowrap;
}
</style>
</head>
<body>
  <img class="a1" src="https://marin-nn.github.io/TheImitationAssignment/penguins.jpg" alt="penguins">
  
  <img class="a2" src="https://marin-nn.github.io/TheImitationAssignment/football_field.jpg" alt="football_field">

  <img class="a3" src="https://marin-nn.github.io/TheImitationAssignment/dinosaur.png" alt="dinosaur">

  <img class="a4" src="https://marin-nn.github.io/TheImitationAssignment/seagull.png" alt="seagull">

  <img class="a5" src="https://marin-nn.github.io/TheImitationAssignment/butterfly.jpg" alt="butterfly">

  <div class="a6">
  <img class="a6" src="https://marin-nn.github.io/TheImitationAssignment/theater_stage.jpg" alt="Stage">
  <div class="a6.t">Presenting</div>
  </div>
</body>
