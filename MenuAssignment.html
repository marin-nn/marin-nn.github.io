<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 40px;
  background: #f4f4f4;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 40px;
  align-items: center;
}

.menu {
  width: 400px;
  height: 550px;
  padding: 20px;
  margin: 10px 0;
  border: 4px solid #333;
  color: white;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  box-sizing: border-box;
  border-radius: 15px;
}

.breakfast {
  background-image: url('https://images.unsplash.com/photo-1505253216365-2f9c327a1b2b');
}

.lunch {
  background-image: url('https://images.unsplash.com/photo-1498579150354-977475b7ea0b');
  background-position: center;
}

.dinner {
  background-image: url('https://images.unsplash.com/photo-1473093295043-cdd812d0e601');
  background-repeat: no-repeat;
}

h2 {
  text-align: center;
}

ul {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>
<body>
<div class="container">

<div class="menu breakfast">
<h2>Breakfast Menu</h2>
<ul>
<li>Pancakes</li>
<li>Omelette</li>
<li>Fruit Bowl</li>
<li>Coffee</li>
<li>Orange Juice</li>
</ul>
</div>

<div class="menu lunch">
<h2>Lunch Menu</h2>
<ul>
<li>Grilled Chicken Sandwich</li>
<li>Caesar Salad</li>
<li>Cheeseburger</li>
<li>Iced Tea</li>
<li>Lemonade</li>
</ul>
</div>

<div class="menu dinner">
<h2>Dinner Menu</h2>
<ul>
<li>Steak</li>
<li>Mashed Potatoes</li>
<li>Grilled Salmon</li>
<li>Wine</li>
<li>Chocolate Cake</li>
</ul>
</div>

</div>
</body>
</html>
