<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 40px;
  background: #f4f4f4;
}

.menu {
  width: 400px;
  height: 400px;
  padding: 20px;
  margin: 10px;
  border: 4px solid black;
  color: white;
  background-size: 400px 400px;
  background-repeat: no-repeat;
  box-sizing: border-box;
}
.breakfast {
  background-image: url('https://cdn.pixabay.com/photo/2016/11/29/12/15/berries-1869421_1280.jpg');
  background-position: top;
}

.lunch {
  background-image: url('https://cdn.pixabay.com/photo/2021/05/24/07/07/steak-6278031_1280.jpg');
  background-position: center;
}

.dinner {
  background-image: url('https://cdn.pixabay.com/photo/2024/04/13/21/58/spaghetti-and-meatballs-8694542_1280.jpg');
  background-position: bottom;
}

h2 {
  text-align: center;
}
</style>
</head>
<body>
<div class="container">

<div class="menu breakfast">
<h2>Breakfast Menu</h2>
<ul>
<li>Pancakes</li>
<li>Omelette</li>
<li>Eggs</li>
<li>Toasts</li>
<li>Fruit Bowl</li>
</ul>
</div>

<div class="menu lunch">
<h2>Lunch Menu</h2>
<ul>
<li>Steak</li>
<li>Smoked Ribs</li>
<li>Grilled Potatoes</li>
<li>Sandwich</li>
<li>Caesar Salad</li>
<li>Classic Burger</li>
<li>Cheeseburger</li>
<li>Fries</li>
</ul>
</div>

<div class="menu dinner">
<h2>Dinner Menu</h2>
<ul>
<li>Mac and Cheese</li>
<li>Spaghetti</li>
<li>Carbonara</li>
<li>Bolognese</li>
</ul>
</div>

</div>
</body>
</html>
